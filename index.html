<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유유기지동구청년21 - 호이 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00a0c9;
    --primary-dark: #006782;
    --primary-light: #e0f5fb;
    --error: #e03c3c;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --text: #191c1e;
    --text-muted: #5a6472;
    --border: rgba(0,0,0,0.08);
    --shadow-up: -8px -8px 16px rgba(255,255,255,0.9), 8px 8px 20px rgba(0,100,130,0.12);
    --shadow-in: inset -4px -4px 10px rgba(255,255,255,0.8), inset 4px 4px 10px rgba(0,100,130,0.08);
    --shadow-card: -12px -12px 24px rgba(255,255,255,1), 12px 12px 24px rgba(0,100,130,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Gothic A1', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    width: 100%; max-width: 900px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(240,244,248,0.88);
    backdrop-filter: blur(14px);
  }
  .logo {
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem; color: var(--primary-dark);
    cursor: pointer; letter-spacing: -0.5px;
  }
  .logo span { color: var(--primary); }
  .header-btns { display: flex; gap: 10px; }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); box-shadow: var(--shadow-up);
    font-size: 1.1rem; transition: all .2s;
  }
  .icon-btn:active { transform: scale(.92); box-shadow: var(--shadow-in); }

  /* ── Screens ── */
  main { flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
  .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; animation: fadeUp .4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }

  /* ── Home ── */
  .home-card {
    background: var(--bg); box-shadow: var(--shadow-card);
    border-radius: 32px; padding: 40px 32px;
    max-width: 420px; width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 28px; text-align: center;
  }
  .avatar-wrap {
    width: 110px; height: 110px; border-radius: 50%;
    box-shadow: var(--shadow-in);
    display: flex; align-items: center; justify-content: center;
    font-size: 6rem; overflow: hidden;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .home-title { font-family: 'Jua', sans-serif; font-size: 1.7rem; line-height: 1.4; color: var(--text); }
  .home-title span { color: var(--primary); }
  .progress-label { display:flex; justify-content:space-between; width:100%; font-size:.85rem; font-weight:700; color:var(--text-muted); }
  .progress-label strong { color: var(--primary); font-size:1rem; }
  .progress-track {
    width: 100%; height: 12px; border-radius: 99px;
    background: var(--bg); box-shadow: var(--shadow-in); overflow: hidden; padding: 2px;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--primary-dark), var(--primary));
    box-shadow: 0 0 10px rgba(0,160,201,.4);
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }
  .pulse-text { color: var(--primary); font-weight: 700; font-size: .9rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Quiz ── */
  .quiz-wrap { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .q-progress-track { width: 100%; height: 10px; border-radius: 99px; background: var(--bg); box-shadow: var(--shadow-in); padding: 2px; }
  .q-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--primary-dark), var(--primary)); box-shadow: 0 0 10px rgba(0,160,201,.4); transition: width .4s; }

  .question-card {
    width: 100%; background: var(--bg); box-shadow: var(--shadow-card);
    border-radius: 28px; padding: 36px 28px; position: relative; overflow: hidden;
  }
  .question-card::before {
    content:''; position:absolute; top:0; left:0; width:5px; height:100%;
    background: linear-gradient(180deg, var(--primary), var(--primary-dark));
    border-radius: 4px 0 0 4px;
  }
  .q-num { font-size:.8rem; font-weight:700; color:var(--primary); margin-bottom:10px; letter-spacing:.08em; text-transform: uppercase; }
  .question-text { font-family: 'Gothic A1', sans-serif; font-weight: 900; font-size: clamp(1.2rem, 3.5vw, 1.7rem); line-height: 1.55; color: var(--text); }
  .q-hint { font-size:.82rem; color:var(--text-muted); margin-top:14px; font-weight:500; }

  .answer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; }
  .answer-btn {
    background: var(--bg); box-shadow: var(--shadow-card); border: none; cursor: pointer;
    border-radius: 24px; padding: 32px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: all .25s; outline: none;
  }
  .answer-btn:hover { transform: translateY(-3px); }
  .answer-btn:active { transform: scale(.95); box-shadow: var(--shadow-in); }
  .answer-btn .big-letter { font-family: 'Jua', sans-serif; font-size: clamp(4rem, 12vw, 7rem); line-height: 1; }
  .answer-btn .btn-label { font-weight: 800; font-size: 1.1rem; }
  .btn-o .big-letter, .btn-o .btn-label { color: var(--primary); }
  .btn-x .big-letter, .btn-x .btn-label { color: var(--error); }

  /* ── Result ── */
  .result-card {
    background: var(--bg); box-shadow: var(--shadow-card);
    border-radius: 32px; padding: 44px 28px; max-width: 520px; width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center;
  }
  .result-icon {
    width: 90px; height: 90px; border-radius: 50%; box-shadow: var(--shadow-in);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Jua', sans-serif; font-size: 3.2rem;
  }
  .result-big { font-family: 'Jua', sans-serif; font-size: clamp(2.5rem, 9vw, 4rem); }
  .result-q { font-weight: 800; font-size: 1rem; color: var(--text-muted); line-height: 1.6; }
  .result-answer-row { display: flex; align-items: center; gap: 12px; }
  .result-answer-label { font-weight: 800; color: var(--text-muted); font-size: 1.1rem; }
  .result-answer-val { font-family: 'Jua', sans-serif; font-size: 3rem; }
  .explanation-box {
    background: var(--bg); box-shadow: var(--shadow-in);
    border-radius: 20px; padding: 22px 20px; text-align: left;
    font-weight: 700; font-size: .96rem; color: var(--text-muted); line-height: 1.7;
    width: 100%;
  }
  .next-btn {
    width: 100%; padding: 18px; border-radius: 20px; border: none; cursor: pointer;
    font-family: 'Jua', sans-serif; font-size: 1.15rem;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; box-shadow: 0 6px 20px rgba(0,160,201,.35);
    transition: all .25s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,160,201,.45); }
  .next-btn:active { transform: scale(.97); }

  /* ── Admin ── */
  .admin-wrap { width: 100%; max-width: 700px; }
  .admin-title { font-family: 'Jua', sans-serif; font-size: 2rem; color: var(--text); margin-bottom: 8px; }
  .admin-sub { font-size: .9rem; color: var(--text-muted); margin-bottom: 28px; }
  .login-card { background: var(--bg); box-shadow: var(--shadow-card); border-radius: 24px; padding: 36px 28px; max-width: 400px; width: 100%; }
  .field-label { font-size: .85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .pw-input {
    width: 100%; padding: 14px 18px; border-radius: 14px; border: none; outline: none;
    background: var(--bg); box-shadow: var(--shadow-in);
    font-size: 1rem; font-family: inherit; color: var(--text); margin-bottom: 20px;
  }
  .login-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; font-family: 'Jua', sans-serif; font-size: 1.1rem;
    box-shadow: 0 4px 16px rgba(0,160,201,.3); transition: all .2s;
  }
  .login-btn:hover { transform: translateY(-2px); }

  .q-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .q-item {
    background: var(--bg); box-shadow: var(--shadow-up); border-radius: 16px;
    padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all .2s;
  }
  .q-item:hover { transform: translateX(4px); }
  .q-num-badge { font-family: 'Jua', sans-serif; color: var(--primary); min-width: 32px; font-size: .9rem; }
  .q-item-text { flex:1; font-weight: 700; font-size: .9rem; line-height: 1.4; color: var(--text); overflow: hidden; display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .q-badge { font-family: 'Jua', sans-serif; font-size: 1.1rem; }
  .edit-panel { background: var(--bg); box-shadow: var(--shadow-card); border-radius: 24px; padding: 28px; width: 100%; }
  .edit-panel textarea {
    width: 100%; padding: 14px 16px; border-radius: 14px; border: none; outline: none;
    background: var(--bg); box-shadow: var(--shadow-in); font-family: inherit;
    font-size: .95rem; color: var(--text); resize: vertical; min-height: 80px; margin-bottom: 16px;
  }
  .ans-toggle { display: flex; gap: 12px; margin-bottom: 16px; }
  .ans-option {
    flex: 1; padding: 14px; border-radius: 14px; border: none; cursor: pointer;
    font-family: 'Jua', sans-serif; font-size: 1.5rem;
    background: var(--bg); box-shadow: var(--shadow-up);
    transition: all .2s;
  }
  .ans-option.selected-o { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(0,160,201,.4); }
  .ans-option.selected-x { background: var(--error); color: #fff; box-shadow: 0 4px 14px rgba(224,60,60,.4); }
  .save-btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; font-family: 'Jua', sans-serif; font-size: 1rem;
    box-shadow: 0 4px 16px rgba(0,160,201,.3); transition: all .2s;
  }
  .save-btn:hover { transform: translateY(-1px); }
  .add-btn {
    width: 100%; padding: 14px; border-radius: 14px; border: 2px dashed var(--primary);
    background: transparent; color: var(--primary); font-family: 'Jua', sans-serif;
    font-size: 1rem; cursor: pointer; transition: all .2s; margin-bottom: 16px;
  }
  .add-btn:hover { background: var(--primary-light); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--error); font-size: 1.1rem; padding: 4px; }
  .logout-link { color: var(--text-muted); font-size: .85rem; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); box-shadow: var(--shadow-up);
    border: none; border-radius: 30px; padding: 10px 20px; cursor: pointer;
    font-family: inherit; font-weight: 700; color: var(--primary); font-size: .9rem;
    margin-bottom: 20px; transition: all .2s;
  }
  .back-btn:hover { transform: translateX(-3px); }

  /* correct glow */
  .correct-glow { box-shadow: 0 0 0 3px var(--primary), var(--shadow-up); }
  .answered-o { background: rgba(0,160,201,0.08); }
  .answered-x { background: rgba(224,60,60,0.08); }

  @media (max-width: 480px) {
    .answer-btns { grid-template-columns: 1fr 1fr; gap: 12px; }
    .answer-btn { padding: 24px 10px; }
    .home-card { padding: 32px 20px; }
  }
</style>
</head>

        <button class="add-btn" onclick="addQuestion()">＋ 새 문제 추가</button>
        <div class="q-list" id="admin-q-list"></div>
        <div class="edit-panel" id="edit-panel" style="display:none">
          <div style="font-family:'Black Han Sans',sans-serif;font-size:1.2rem;margin-bottom:16px">문제 편집</div>
          <label class="field-label">질문 내용</label>
          <textarea id="edit-q" rows="3" placeholder="질문을 입력하세요"></textarea>
          <label class="field-label">정답</label>
          <div class="ans-toggle">
            <button class="ans-option" id="ans-o" onclick="selectAns('O')">O</button>
            <button class="ans-option" id="ans-x" onclick="selectAns('X')">X</button>
          </div>
          <label class="field-label">해설</label>
          <textarea id="edit-exp" rows="3" placeholder="해설을 입력하세요"></textarea>
          <button class="save-btn" onclick="saveQuestion()">💾 저장하기</button>
        </div>
        <div style="margin-top:20px;text-align:right">
          <span class="logout-link" onclick="resetToDefault()" style="color:var(--error)">⚠️ 기본 문제로 초기화</span>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
// ──────────────────────────────────────────
// Data
// ──────────────────────────────────────────
const DEFAULT_QUESTIONS = [
  { id:'1', question:"동구에서 공식적으로 인정하는 '청년'은 34살까지만이다?", answer:'X', explanation:'아니요! 동구는 더 많은 분이 혜택을 받으실 수 있도록 39세까지 청년으로 본답니다. 생각보다 기간이 넉넉하죠?' },
  { id:'2', question:'동구로 새로 이사를 오면, 이사비를 지원해 준다?', answer:'O', explanation:"맞아요! '동구 청년 웰컴페이'를 통해 실제 이사에 든 비용을 지원해 드려요. 동구로 오는 첫걸음을 응원하는 웰컴 선물이에요." },
  { id:'3', question:"청년 월세 지원은 '1번'만 받을 수 있다?", answer:'X', explanation:'요건만 맞으면 월 최대 20만 원씩 일정 기간(최대 12회~24회 등) 지원받을 수 있어요. 매달 나가는 주거비 부담을 확 줄여준답니다.' },
  { id:'4', question:'자격증 시험 응시료는 인천 청년이라면 10만 원까지 돌려받는다?', answer:'O', explanation:'어학이나 국가기술자격증 시험비가 부담된다면 꼭 신청하세요! 연간 1인 10만 원 한도 내에서 실비를 지원해 드립니다.' },
  { id:'5', question:"동구에는 청년 전용 공간 '유유기지 동구청년21'이 있다?", answer:'O', explanation:"맞습니다! '유유기지 동구청년21'은 카페 같은 예쁜 공간 대여부터 다양한 꿀잼 프로그램까지 운영하는 우리들만의 아지트예요." },
  { id:'6', question:"'동구 청년 컬처페이'는 문화생활을 즐기라고 포인트를 주는 사업이다?", answer:'O', explanation:'맞아요! 소득 기준에 맞으면 20만 원의 e음 포인트를 지원받아 영화, 공연, 도서 구매 등 문화생활을 마음껏 즐길 수 있어요.' },
  { id:'7', question:"동구의 청년 정책은 딱 '일자리'와 '소통' 문제만 지원한다?", answer:'X', explanation:'아니요! [참여·소통, 일자리·주거, 교육·개발, 문화·복지] 등 4개 분야로 촘촘하게 나누어 청년의 삶 전체를 응원하고 있어요.' },
  { id:'8', question:'취업 준비가 막막할 때, 전문가가 1:1로 코칭해주는 프로그램이 있다?', answer:'O', explanation:'네! 혼자 준비하기 힘든 분들을 위해 취업 역량을 키워주는 다양한 부트캠프와 컨설팅이 준비되어 있어요. 나에게 딱 맞는 취업 전략을 세울 수 있답니다.' },
  { id:'9', question:'실제로 대기업에서 일하고 있는 현직자에게 직접 취업 특강을 들을 수 있다?', answer:'O', explanation:"맞습니다! '현직자 취업특강'을 통해 책에는 나오지 않는 진짜 회사 생활과 합격 꿀팁을 생생하게 들을 수 있어요." },
  { id:'10', question:"'청년내일저축계좌'는 내가 10만 원 저축하면 나라에서 돈을 더 얹어준다?", answer:'O', explanation:'본인이 저축한 금액에 정부지원금을 매달 10만 원에서 최대 30만 원까지 추가로 적립해 드려요. (소득 기준별 상이)' },
  { id:'11', question:"이사비 지원 한도 안에는 '입주 청소비'나 '부동산 복비'도 포함된다?", answer:'O', explanation:'단순히 짐 옮기는 비용만 주는 게 아니에요. 부동산 중개보수와 깨끗한 시작을 위한 입주 청소비까지 모두 챙겨드린답니다.' },
  { id:'12', question:'동구 청년들이 직접 "우리 이런 거 필요해요!"라고 정책을 제안할 수 있을까?', answer:'O', explanation:"맞아요! '청년정책네트워크'라는 모임이 있어요. 청년들이 직접 아이디어를 내서 실제로 동구의 정책을 바꾸기도 하는 멋진 소통 창구랍니다!" },
  { id:'13', question:"동구에 거주하지 않아도 모든 '동구 청년 사업'에 참여할 수 있다?", answer:'X', explanation:'아쉽지만 사업마다 기준이 달라요. 주로 동구에 거주하거나 동구 소재 직장/학교에 다니는 청년들을 우선으로 지원하고 있으니 공고문을 꼭 확인해 주세요!' },
  { id:'14', question:'구직을 잠시 쉬고 있거나 자신감이 떨어진 청년을 위한 맞춤 프로그램도 있다?', answer:'O', explanation:"'청년도전지원사업'이 있어요. 사회활동에 다시 참여할 용기를 얻고 의욕을 높일 수 있도록 따뜻하게 도와드립니다." },
  { id:'15', question:'동구 청년 정책은 찾기 힘들게 꽁꽁 숨겨져 있다?', answer:'X', explanation:"아니요! '유유기지 동구청년21' 홈페이지나 SNS를 팔로우하면 훨씬 더 쉽고 재미있는 소식들을 실시간으로 확인할 수 있답니다!" },
];

// ──────────────────────────────────────────
// State
// ──────────────────────────────────────────
let questions = loadQuestions();
let correctIds = loadCorrect();
let currentIdx = 0;
let editingId = null;
let editingAnswer = 'O';
let isAdmin = false;

function loadQuestions() {
  try { const s = localStorage.getItem('quiz_questions'); if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; } } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
}
function loadCorrect() {
  try { const s = localStorage.getItem('user_correct_answers'); if (s) return JSON.parse(s); } catch(e){}
  return [];
}
function saveQuestions() { localStorage.setItem('quiz_questions', JSON.stringify(questions)); }
function saveCorrect() { localStorage.setItem('user_correct_answers', JSON.stringify(correctIds)); }

// ──────────────────────────────────────────
// Screens
// ──────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'home') updateHome();
  if (name === 'admin') renderAdmin();
}

// ──────────────────────────────────────────
// Home
// ──────────────────────────────────────────
function updateHome() {
  const total = questions.length;
  const got = correctIds.length;
  document.getElementById('score-count').textContent = got;
  document.getElementById('score-total').textContent = total;
  document.getElementById('home-progress').style.width = total ? (got / total * 100) + '%' : '0%';
}

// ──────────────────────────────────────────
// Quiz
// ──────────────────────────────────────────
function startQuiz() {
  currentIdx = 0;
  showQuizQuestion();
  showScreen('quiz');
}

function showQuizQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  document.getElementById('q-num').textContent = `Q${currentIdx + 1} / ${total}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('quiz-progress').style.width = ((currentIdx + 1) / total * 100) + '%';
}

function handleAnswer(choice) {
  const q = questions[currentIdx];
  const correct = choice === q.answer;
  if (correct && !correctIds.includes(q.id)) {
    correctIds.push(q.id);
    saveCorrect();
  }
  showResult(correct, q);
}

function showResult(isCorrect, q) {
  const icon = document.getElementById('result-icon');
  const big = document.getElementById('result-big');
  const ansVal = document.getElementById('result-answer-val');

  if (isCorrect) {
    icon.textContent = 'O';
    icon.style.color = 'var(--primary)';
    big.textContent = '정답입니다!';
    big.style.color = 'var(--primary)';
    ansVal.style.color = q.answer === 'O' ? 'var(--primary)' : 'var(--error)';
  } else {
    icon.textContent = 'X';
    icon.style.color = 'var(--error)';
    big.textContent = '오답입니다';
    big.style.color = 'var(--error)';
    ansVal.style.color = q.answer === 'O' ? 'var(--primary)' : 'var(--error)';
  }
  document.getElementById('result-q').textContent = q.question;
  document.getElementById('result-answer-val').textContent = q.answer;
  document.getElementById('result-explanation').textContent = q.explanation;

  document.getElementById('result-next-btn').textContent = '호이 QR코드를 찾아보세요! 🔍';

  showScreen('result');
}

function goNext() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    showQuizQuestion();
    showScreen('quiz');
  } else {
    showScreen('home');
  }
}

// ──────────────────────────────────────────
// Admin
// ──────────────────────────────────────────
function renderAdmin() {
  document.getElementById('admin-login').style.display = isAdmin ? 'none' : 'block';
  document.getElementById('admin-dash').style.display = isAdmin ? 'block' : 'none';
  if (isAdmin) renderQList();
}

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === '1234') {
    isAdmin = true;
    document.getElementById('login-err').style.display = 'none';
    renderAdmin();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  isAdmin = false;
  document.getElementById('pw-input').value = '';
  renderAdmin();
}

function renderQList() {
  const list = document.getElementById('admin-q-list');
  list.innerHTML = '';
  const baseUrl = window.location.origin + window.location.pathname;
  questions.forEach((q, i) => {
    const qrLink = `${baseUrl}?q=${q.id}`;
    const div = document.createElement('div');
    div.className = 'q-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'flex-start';
    div.style.gap = '6px';
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;width:100%;">
        <span class="q-num-badge">Q${i+1}</span>
        <span class="q-item-text" style="-webkit-line-clamp:1;">${q.question}</span>
        <span class="q-badge" style="color:${q.answer==='O'?'var(--primary)':'var(--error)'};min-width:20px;">${q.answer}</span>
        <button class="del-btn" onclick="deleteQuestion('${q.id}',event)">🗑</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding-left:4px;width:100%;">
        <span style="font-size:.72rem;color:var(--primary);font-weight:700;">🔗 QR링크:</span>
        <a href="${qrLink}" target="_blank" style="font-size:.72rem;color:var(--text-muted);word-break:break-all;text-decoration:underline;">${qrLink}</a>
        <button onclick="copyLink('${qrLink}',event)" style="background:none;border:1px solid var(--primary);border-radius:6px;padding:2px 6px;font-size:.7rem;color:var(--primary);cursor:pointer;white-space:nowrap;">복사</button>
      </div>
    `;
    div.onclick = (e) => {
      if (!e.target.classList.contains('del-btn') && e.target.tagName!=='A' && e.target.tagName!=='BUTTON') openEdit(q.id);
    };
    list.appendChild(div);
  });
}

function openEdit(id) {
  editingId = id;
  const q = questions.find(x => x.id === id);
  document.getElementById('edit-q').value = q.question;
  document.getElementById('edit-exp').value = q.explanation;
  editingAnswer = q.answer;
  updateAnsToggle();
  document.getElementById('edit-panel').style.display = 'block';
  document.getElementById('edit-panel').scrollIntoView({ behavior: 'smooth' });
}

function copyLink(url, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(url).then(() => alert('QR 링크가 복사되었습니다!')).catch(() => {
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('QR 링크가 복사되었습니다!');
  });
}

function addQuestion() {
  const newQ = { id: Date.now().toString(), question: '새로운 질문을 입력하세요', answer: 'O', explanation: '해설을 입력하세요' };
  questions.push(newQ);
  saveQuestions();
  renderQList();
  openEdit(newQ.id);
}

function deleteQuestion(id, e) {
  e.stopPropagation();
  if (!confirm('이 문제를 삭제할까요?')) return;
  questions = questions.filter(q => q.id !== id);
  saveQuestions();
  if (editingId === id) { editingId = null; document.getElementById('edit-panel').style.display = 'none'; }
  renderQList();
}

function selectAns(v) { editingAnswer = v; updateAnsToggle(); }
function updateAnsToggle() {
  document.getElementById('ans-o').className = 'ans-option' + (editingAnswer==='O' ? ' selected-o' : '');
  document.getElementById('ans-x').className = 'ans-option' + (editingAnswer==='X' ? ' selected-x' : '');
}

function saveQuestion() {
  if (!editingId) return;
  const idx = questions.findIndex(q => q.id === editingId);
  if (idx === -1) return;
  questions[idx].question = document.getElementById('edit-q').value;
  questions[idx].explanation = document.getElementById('edit-exp').value;
  questions[idx].answer = editingAnswer;
  saveQuestions();
  renderQList();
  document.getElementById('edit-panel').style.display = 'none';
  editingId = null;
  alert('저장되었습니다!');
}

function resetToDefault() {
  if (!confirm('모든 문제를 기본 15문항으로 초기화하시겠습니까?')) return;
  questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  saveQuestions();
  renderQList();
  document.getElementById('edit-panel').style.display = 'none';
  alert('초기화 완료!');
}

// ──────────────────────────────────────────
// URL param: ?q=<id>
// ──────────────────────────────────────────
(function() {
  const params = new URLSearchParams(location.search);
  const qId = params.get('q');
  if (qId) {
    const idx = questions.findIndex(q => q.id === qId);
    if (idx !== -1) { currentIdx = idx; showQuizQuestion(); showScreen('quiz'); return; }
  }
  showScreen('home');
  updateHome();
})();
</script>
</body>
</html>
